<!DOCTYPE html>
<html>

<head>
<title>AI Universal Hub</title>

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
margin-top:10px;
}

button{
margin-top:10px;
padding:8px 14px;
}

#response{
margin-top:20px;
border:1px solid #ccc;
padding:10px;
}
</style>

</head>

<body>

<h1>AI Universal Hub</h1>

<p>Select AI Model</p>

<select id="model">
<option>ChatGPT</option>
<option>Claude</option>
<option>Gemini</option>
<option>Perplexity</option>
</select>

<br><br>

<textarea id="prompt" rows="8" placeholder="Enter your prompt here"></textarea>

<br>

<button onclick="sendPrompt()">Submit</button>

<div id="response">
AI response will appear here
</div>

<script>

function sendPrompt(){

let prompt=document.getElementById("prompt").value;
let model=document.getElementById("model").value;

document.getElementById("response").innerHTML =
"Prompt sent to "+model+":<br><br>"+prompt;

}

</script>

</body>

</html>
